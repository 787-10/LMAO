fleet:
  - name: mars-the-18th
    host: 172.17.30.66
    port: 9090
    capabilities: [navigate, manipulate, scan]

claude:
  model: claude-sonnet-4-20250514
  max_tokens: 4096

local_brain:
  host: localhost
  port: 8765

health:
  rate_window_s: 2.0
  rate_degraded_threshold: 0.5   # <50% of expected rate = DEGRADED
  rate_failed_threshold: 0.0     # ==0 = FAILED
  heartbeat_timeout_s: 5.0
  comms_blackout_s: 10.0
  eval_interval_s: 1.0
